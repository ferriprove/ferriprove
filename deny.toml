# Cargo-deny configuration for Ferriprove
# See https://embarkstudios.github.io/cargo-deny/

# Graph configuration
[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-apple-darwin" },
    { triple = "aarch64-unknown-linux-gnu" },
]

# Licenses configuration
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = [
    { name = "unicode-ident", allow = ["MIT", "Apache-2.0", "Unicode-DFS-2016"] },
    { name = "unicode-width", allow = ["MIT", "Apache-2.0", "Unicode-DFS-2016"] },
]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd89eed7 }
]

# Bans configuration
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = [
    { name = "libc", version = "0.2" },
    { name = "memchr", version = "2" },
    { name = "proc-macro2", version = "1" },
    { name = "quote", version = "1" },
    { name = "syn", version = "1" },
    { name = "syn", version = "2" },
    { name = "unicode-ident", version = "1" },
    { name = "serde", version = "1" },
    { name = "serde_core", version = "1" },
    { name = "serde_derive", version = "1" },
    { name = "scopeguard", version = "1" },
    { name = "smallvec", version = "1" },
    { name = "windows-link", version = "0.2" },
    { name = "cfg-if", version = "1" },
    { name = "once_cell", version = "1" },
    { name = "hashbrown", version = "0.14" },
    { name = "crossbeam-utils", version = "0.8" },
    { name = "lock_api", version = "0.4" },
    { name = "parking_lot_core", version = "0.9" },
    { name = "bumpalo", version = "3" },
    { name = "dashmap", version = "6" },
    { name = "rustc-hash", version = "1" },
    { name = "ferriprove-types", version = "0.0.1" },
    { name = "ferriprove-export", version = "0.0.1" },
    { name = "ferriprove-kernel", version = "0.0.1" },
    { name = "ferriprove-elab", version = "0.0.1" },
    { name = "ferriprove-tactic", version = "0.0.1" },
    { name = "ferriprove-lsp", version = "0.0.1" },
    { name = "ferriprove-cli", version = "0.0.1" },
]
deny = [
    # Add specific crates to deny here if needed
]
skip = [
    # Add specific crate versions to skip checking here if needed
]
skip-tree = [
    # Add entire dependency trees to skip here if needed
]

# Advisory configuration
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Add specific advisories to ignore here if needed
    # Example: "RUSTSEC-2020-0001"
]

# Sources configuration
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
