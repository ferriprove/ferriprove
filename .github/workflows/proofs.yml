name: Proofs

on:
  push:
    branches: [ main ]
    pull_request:
    branches: [ main ]
  schedule:
    # Run proofs daily
    - cron: '0 3 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  lean-proofs:
    name: Lean Proofs
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.ref == 'refs/heads/main' }}
    steps:
    - uses: actions/checkout@v4

    - name: Install Elan
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean 4
      run: elan default leanprover/lean4:stable

    - name: Cache Lean packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan/toolchains
          .lake/build
        key: ${{ runner.os }}-lean-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
        restore-keys: |
          ${{ runner.os }}-lean-

    - name: Build proofs
      run: |
        if [ -d "proofs" ]; then
          cd proofs
          lake build
        else
          echo "No proofs directory found, skipping Lean proofs"
        fi

    - name: Check proofs
      run: |
        if [ -d "proofs" ]; then
          cd proofs
          lake env lean --check *.lean
        fi

  aeneas-verification:
    name: Aeneas Verification
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.ref == 'refs/heads/main' }}
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Aeneas
      run: |
        pip install aeneas

    - name: Run Aeneas on kernel
      run: |
        if [ -f "ferriprove-kernel/src/lib.rs" ]; then
          cd ferriprove-kernel
          aeneas --rust src/lib.rs --lean ../proofs/KernelModel.lean
        else
          echo "No kernel source found, skipping Aeneas verification"
        fi

    - name: Check generated Lean code
      run: |
        if [ -f "proofs/KernelModel.lean" ]; then
          cd proofs
          lake env lean --check KernelModel.lean
        fi

  benchmark-proofs:
    name: Proof Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Install Elan
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean 4
      run: elan default leanprover/lean4:stable

    - name: Cache Lean packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan/toolchains
          .lake/build
        key: ${{ runner.os }}-lean-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
        restore-keys: |
          ${{ runner.os }}-lean-

    - name: Benchmark proofs
      run: |
        if [ -d "proofs" ]; then
          cd proofs
          time lake build
        fi
