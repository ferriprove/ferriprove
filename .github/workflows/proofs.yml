name: Proofs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run proofs daily
    - cron: '0 3 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  lean-proofs:
    name: Lean Proofs
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.ref == 'refs/heads/main' }}
    steps:
    - uses: actions/checkout@v4

    - name: Check for proofs directory
      id: check-proofs
      run: |
        if [ -d "proofs" ]; then
          echo "proofs_exists=true" >> $GITHUB_OUTPUT
        else
          echo "proofs_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Elan
      if: steps.check-proofs.outputs.proofs_exists == 'true'
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean 4
      if: steps.check-proofs.outputs.proofs_exists == 'true'
      run: elan default leanprover/lean4:stable

    - name: Cache Lean packages
      if: steps.check-proofs.outputs.proofs_exists == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan/toolchains
          .lake/build
        key: ${{ runner.os }}-lean-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
        restore-keys: |
          ${{ runner.os }}-lean-

    - name: Build proofs
      if: steps.check-proofs.outputs.proofs_exists == 'true'
      run: |
        cd proofs
        lake build

    - name: Skip proofs
      if: steps.check-proofs.outputs.proofs_exists == 'false'
      run: |
        echo "No proofs directory found, skipping Lean proofs"
        echo "::notice::Lean proofs workflow skipped - no proofs directory found"

  aeneas-verification:
    name: Aeneas Verification
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.ref == 'refs/heads/main' }}
    steps:
    - uses: actions/checkout@v4

    - name: Check for Aeneas requirements
      id: check-aeneas
      run: |
        if [ -f "ferriprove-kernel/src/lib.rs" ] && [ -d "proofs" ]; then
          echo "aeneas_ready=true" >> $GITHUB_OUTPUT
        else
          echo "aeneas_ready=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Rust
      if: steps.check-aeneas.outputs.aeneas_ready == 'true'
      uses: dtolnay/rust-toolchain@stable

    - name: Install Aeneas
      if: steps.check-aeneas.outputs.aeneas_ready == 'true'
      run: |
        pip install aeneas

    - name: Run Aeneas on kernel
      if: steps.check-aeneas.outputs.aeneas_ready == 'true'
      run: |
        cd ferriprove-kernel
        aeneas --rust src/lib.rs --lean ../proofs/KernelModel.lean

    - name: Check generated Lean code
      if: steps.check-aeneas.outputs.aeneas_ready == 'true'
      run: |
        cd proofs
        lake env lean --check KernelModel.lean

    - name: Skip Aeneas
      if: steps.check-aeneas.outputs.aeneas_ready == 'false'
      run: |
        echo "Skipping Aeneas verification - kernel source or proofs directory not found"
        echo "::notice::Aeneas verification workflow skipped - missing requirements"

  benchmark-proofs:
    name: Proof Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Check for proofs directory
      id: check-benchmark
      run: |
        if [ -d "proofs" ]; then
          echo "proofs_exists=true" >> $GITHUB_OUTPUT
        else
          echo "proofs_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Elan
      if: steps.check-benchmark.outputs.proofs_exists == 'true'
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean 4
      if: steps.check-benchmark.outputs.proofs_exists == 'true'
      run: elan default leanprover/lean4:stable

    - name: Cache Lean packages
      if: steps.check-benchmark.outputs.proofs_exists == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan/toolchains
          .lake/build
        key: ${{ runner.os }}-lean-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
        restore-keys: |
          ${{ runner.os }}-lean-

    - name: Benchmark proofs
      if: steps.check-benchmark.outputs.proofs_exists == 'true'
      run: |
        cd proofs
        time lake build

    - name: Skip benchmark
      if: steps.check-benchmark.outputs.proofs_exists == 'false'
      run: |
        echo "Skipping proof benchmarks - no proofs directory found"
        echo "::notice::Proof benchmarks workflow skipped - no proofs directory found"
