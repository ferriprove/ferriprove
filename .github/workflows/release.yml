name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

  build-and-upload:
    name: Build and Upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ferriprove
            asset_name: ferriprove-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ferriprove
            asset_name: ferriprove-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ferriprove
            asset_name: ferriprove-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ferriprove.exe
            asset_name: ferriprove-windows-x86_64.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build binary
      run: cargo build --release --target ${{ matrix.target }} --bin ferriprove

    - name: Strip binary (Unix)
      if: matrix.os != 'windows-latest'
      run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/octet-stream

  publish-crates:
    name: Publish Crates
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Publish to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        set -e
        for crate in ferriprove-types ferriprove-export ferriprove-kernel ferriprove-elab ferriprove-tactic ferriprove-lsp ferriprove-cli; do
          echo "Publishing $crate"
          cd $crate
          if ! cargo publish; then
            echo "Failed to publish $crate"
            exit 1
          fi
          cd ..
          echo "Successfully published $crate, waiting 30 seconds..."
          sleep 30
        done
        echo "All crates published successfully!"

  generate-changelog:
    name: Generate Changelog
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install git-cliff
      run: cargo install git-cliff

    - name: Generate changelog
      run: |
        git cliff --latest --output CHANGELOG.md
        cat CHANGELOG.md

    - name: Update release with changelog
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            body: changelog
          });

  sign-release:
    name: Sign Release
    needs: [create-release, build-and-upload, publish-crates]
    runs-on: ubuntu-latest
    steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign release assets
      env:
        COSIGN_EXPERIMENTAL: 1
      run: |
        cosign sign --yes \
          --key env://COSIGN_PRIVATE_KEY \
          ${{ needs.create-release.outputs.upload_url }}
      env:
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}

  generate-sbom:
    name: Generate SBOM
    needs: [create-release, build-and-upload, publish-crates]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-cyclonedx
      run: cargo install cargo-cyclonedx

    - name: Generate SBOM
      run: cargo cyclonedx sbom --workspace

    - name: Upload SBOM
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: bom.json
        asset_name: sbom.json
        asset_content_type: application/json
