# GitHub Labels Configuration for Ferriprove

# Type Labels
- name: "type: bug"
  color: d73a4a
  description: Something isn't working

- name: "type: enhancement"
  color: a2eeef
  description: New feature or request

- name: "type: documentation"
  color: 0075ca
  description: Improvements or additions to documentation

- name: "type: question"
  color: d876e3
  description: Further information is requested

- name: "type: code"
  color: 0075ca
  description: Code changes

- name: "type: tests"
  color: 0075ca
  description: Test-related changes

- name: "type: ci"
  color: 0075ca
  description: CI/CD related changes

- name: "type: dependencies"
  color: 0075ca
  description: Dependency updates

# Status Labels
- name: "status: triage"
  color: ededed
  description: Issue needs triage

- name: "status: in-progress"
  color: fbca04
  description: Currently being worked on

- name: "status: review-needed"
  color: fbca04
  description: Awaiting review

- name: "status: blocked"
  color: e11d21
  description: Blocked by another issue

- name: "status: ready-to-merge"
  color: 0e8a16
  description: Ready to be merged

- name: "status: wont-fix"
  color: ffffff
  description: Will not be fixed

- name: "status: duplicate"
  color: cfd3d7
  description: Duplicate of another issue

- name: "status: help-wanted"
  color: 008672
  description: Community help requested

- name: "status: good-first-issue"
  color: 7057ff
  description: Good for newcomers

# Priority Labels
- name: "priority: critical"
  color: b60205
  description: Critical priority

- name: "priority: high"
  color: d93f0b
  description: High priority

- name: "priority: medium"
  color: fbca04
  description: Medium priority

- name: "priority: low"
  color: fef2c0
  description: Low priority

# Size Labels
- name: "size: xs"
  color: 006b75
  description: Tiny change (0-10 lines)

- name: "size: small"
  color: 0075ca
  description: Small change (10-50 lines)

- name: "size: medium"
  color: 1d76db
  description: Medium change (50-200 lines)

- name: "size: large"
  color: 5319e7
  description: Large change (200-500 lines)

- name: "size: xl"
  color: 986ee2
  description: Very large change (500+ lines)

